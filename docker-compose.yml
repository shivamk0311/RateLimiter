services: 
  postgres: 
    image: postgres:16
    container_name: rate_limiter_postgres
    restart: unless-stopped
    environment: 
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: ratelimiter
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  

  redis:
    image: redis:latest
    container_name: rate_limiter_redis
    restart: unless-stopped
    ports: 
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: